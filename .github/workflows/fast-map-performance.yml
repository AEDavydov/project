name: Fast Map Performance Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  performance:
    if: contains(github.event.pull_request.title, '[FAST]')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TARGET_URL: https://antiborschevik.simargl-team.ru
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Chromium and tools
        run: |
          npm install -g lighthouse@13
          npm install playwright@1.53.2
          npx playwright install --with-deps chromium
          mkdir -p reports/lighthouse reports/browser reports/network
      - name: Network samples
        run: |
          echo 'run,http_code,dns,tcp,tls,ttfb,total,size' > reports/network/curl.csv
          for i in $(seq 1 15); do
            curl -L -sS -o /dev/null --max-time 45 \
              -w "$i,%{http_code},%{time_namelookup},%{time_connect},%{time_appconnect},%{time_starttransfer},%{time_total},%{size_download}\n" \
              "$TARGET_URL" >> reports/network/curl.csv || true
          done
          curl -sSIL "$TARGET_URL" > reports/network/headers.txt || true
      - name: Lighthouse 5x mobile and desktop
        run: |
          for mode in mobile desktop; do
            for i in 1 2 3 4 5; do
              extra=''
              [ "$mode" = desktop ] && extra='--preset=desktop'
              lighthouse "$TARGET_URL" --output=json --output-path="reports/lighthouse/${mode}-${i}.json" \
                --only-categories=performance $extra \
                --chrome-flags='--headless --no-sandbox --disable-dev-shm-usage --enable-precise-memory-info' --quiet || true
            done
          done
      - name: Browser interaction and layer profiling
        run: |
          cat > profile.mjs <<'EOF'
          import {chromium,devices} from 'playwright';
          import fs from 'node:fs';
          const url=process.env.TARGET_URL;
          const profiles=[
            {name:'desktop',opts:{viewport:{width:1440,height:900}},cpu:1,net:null,runs:2},
            {name:'mobile-4g',opts:{...devices['Pixel 7']},cpu:4,net:{offline:false,latency:80,downloadThroughput:200*1024,uploadThroughput:90*1024},runs:3},
            {name:'mobile-slow4g',opts:{...devices['Moto G4']},cpu:6,net:{offline:false,latency:160,downloadThroughput:90*1024,uploadThroughput:30*1024},runs:2}
          ];
          const layers=['Участки','Спутн. 2019','GBIF','iNaturalist','ООПТ','Кадастр','OSM'];
          const browser=await chromium.launch({headless:true,args:['--enable-precise-memory-info','--no-sandbox']});
          const output=[];
          const init=async page=>page.addInitScript(()=>{
            window.__p={long:[],shift:[],event:[]};
            try{new PerformanceObserver(l=>l.getEntries().forEach(e=>window.__p.long.push(e.duration))).observe({type:'longtask',buffered:true})}catch{}
            try{new PerformanceObserver(l=>l.getEntries().forEach(e=>{if(!e.hadRecentInput)window.__p.shift.push(e.value)})).observe({type:'layout-shift',buffered:true})}catch{}
            try{new PerformanceObserver(l=>l.getEntries().forEach(e=>window.__p.event.push(e.duration))).observe({type:'event',buffered:true,durationThreshold:16})}catch{}
          });
          const collect=page=>page.evaluate(()=>{
            const n=performance.getEntriesByType('navigation')[0];
            const r=performance.getEntriesByType('resource').map(x=>({name:x.name,type:x.initiatorType,duration:x.duration,bytes:x.transferSize||0}));
            return {ttfb:n?.responseStart-n?.requestStart,dcl:n?.domContentLoadedEventEnd,load:n?.loadEventEnd,
              resources:r.length,bytes:r.reduce((s,x)=>s+x.bytes,0),heap:performance.memory?.usedJSHeapSize||null,
              dom:document.getElementsByTagName('*').length,longTasks:window.__p.long.length,
              longTaskMs:window.__p.long.reduce((a,b)=>a+b,0),cls:window.__p.shift.reduce((a,b)=>a+b,0),
              slowest:[...r].sort((a,b)=>b.duration-a.duration).slice(0,15),largest:[...r].sort((a,b)=>b.bytes-a.bytes).slice(0,15)};
          });
          for(const p of profiles)for(let run=1;run<=p.runs;run++){
            const ctx=await browser.newContext(p.opts),page=await ctx.newPage(),failed=[],errors=[];
            page.on('requestfailed',r=>failed.push({url:r.url(),error:r.failure()?.errorText}));
            page.on('console',m=>{if(['warning','error'].includes(m.type()))errors.push(m.text())});
            page.on('pageerror',e=>errors.push(String(e)));
            await init(page);const cdp=await ctx.newCDPSession(page);
            if(p.cpu>1)await cdp.send('Emulation.setCPUThrottlingRate',{rate:p.cpu});
            if(p.net)await cdp.send('Network.emulateNetworkConditions',p.net);
            const started=Date.now();let navError=null;
            try{await page.goto(url,{waitUntil:'domcontentloaded',timeout:60000})}catch(e){navError=String(e)}
            await page.waitForTimeout(10000);
            const canvas=page.locator('.maplibregl-canvas,.mapboxgl-canvas,canvas').first();let frames=null;
            if(await canvas.count()){const b=await canvas.boundingBox();if(b){
              await page.evaluate(()=>{window.__f=[];window.__go=true;let p=performance.now();const t=n=>{if(!window.__go)return;window.__f.push(n-p);p=n;requestAnimationFrame(t)};requestAnimationFrame(t)});
              await page.mouse.move(b.x+b.width*.6,b.y+b.height*.55);await page.mouse.down();
              await page.mouse.move(b.x+b.width*.25,b.y+b.height*.4,{steps:20});await page.mouse.up();await page.mouse.wheel(0,-1000);await page.waitForTimeout(3500);
              frames=await page.evaluate(()=>{window.__go=false;const x=window.__f.slice(2).sort((a,b)=>a-b),avg=x.reduce((a,b)=>a+b,0)/x.length;return{fps:1000/avg,p95:x[Math.floor(x.length*.95)],p99:x[Math.floor(x.length*.99)],over50:x.filter(v=>v>50).length}})
            }}
            output.push({kind:'profile',profile:p.name,run,elapsed:Date.now()-started,navError,frames,...await collect(page),failed,errors});
            await page.screenshot({path:`reports/browser/${p.name}-${run}.png`}).catch(()=>{});await ctx.close();
          }
          for(const layer of layers){const ctx=await browser.newContext({viewport:{width:1440,height:900}}),page=await ctx.newPage(),failed=[],errors=[];
            page.on('requestfailed',r=>failed.push({url:r.url(),error:r.failure()?.errorText}));page.on('console',m=>{if(['warning','error'].includes(m.type()))errors.push(m.text())});await init(page);
            let clicked=false,clickError=null,before=null,after=null;
            try{await page.goto(url,{waitUntil:'domcontentloaded',timeout:60000});await page.waitForTimeout(6000);before=await collect(page);
              const el=page.getByText(layer,{exact:false}).first();if(await el.count()){await el.click({timeout:4000});clicked=true}await page.waitForTimeout(8000);after=await collect(page)}catch(e){clickError=String(e)}
            output.push({kind:'layer',layer,clicked,clickError,before,after,failed,errors});await ctx.close();}
          await browser.close();fs.writeFileSync('reports/browser/results.json',JSON.stringify(output,null,2));
          EOF
          node profile.mjs
      - name: Summarize
        run: |
          cat > summarize.mjs <<'EOF'
          import fs from 'node:fs';
          const med=x=>{x=x.filter(Number.isFinite).sort((a,b)=>a-b);return x.length?x[Math.floor(x.length/2)]:null};
          const lh={};for(const mode of ['mobile','desktop']){const a=[];for(let i=1;i<=5;i++){try{const j=JSON.parse(fs.readFileSync(`reports/lighthouse/${mode}-${i}.json`)),u=j.audits;a.push({score:j.categories.performance.score*100,fcp:u['first-contentful-paint'].numericValue,lcp:u['largest-contentful-paint'].numericValue,tbt:u['total-blocking-time'].numericValue,cls:u['cumulative-layout-shift'].numericValue,tti:u.interactive.numericValue,bytes:u['total-byte-weight'].numericValue,requests:u['network-requests'].details.items.length,main:u['mainthread-work-breakdown'].numericValue})}catch{}}lh[mode]=Object.fromEntries(Object.keys(a[0]||{}).map(k=>[k,med(a.map(x=>x[k]))]));}
          const b=JSON.parse(fs.readFileSync('reports/browser/results.json')),scenarios={};for(const name of ['desktop','mobile-4g','mobile-slow4g']){const g=b.filter(x=>x.kind==='profile'&&x.profile===name);scenarios[name]={runs:g.length,ttfb:med(g.map(x=>x.ttfb)),load:med(g.map(x=>x.load)),bytes:med(g.map(x=>x.bytes)),resources:med(g.map(x=>x.resources)),heap:med(g.map(x=>x.heap)),longTasks:med(g.map(x=>x.longTasks)),longTaskMs:med(g.map(x=>x.longTaskMs)),fps:med(g.map(x=>x.frames?.fps)),frameP95:med(g.map(x=>x.frames?.p95)),failed:g.reduce((s,x)=>s+x.failed.length,0),errors:g.reduce((s,x)=>s+x.errors.length,0)}}
          const layers=b.filter(x=>x.kind==='layer').map(x=>({layer:x.layer,clicked:x.clicked,error:x.clickError,bytesDelta:(x.after?.bytes||0)-(x.before?.bytes||0),resourceDelta:(x.after?.resources||0)-(x.before?.resources||0),heapDelta:(x.after?.heap||0)-(x.before?.heap||0),longTaskDelta:(x.after?.longTasks||0)-(x.before?.longTasks||0),failed:x.failed.length,errors:x.errors.length}));
          const summary={generatedAt:new Date().toISOString(),target:process.env.TARGET_URL,lighthouse:lh,scenarios,layers};fs.writeFileSync('reports/summary.json',JSON.stringify(summary,null,2));
          let m='# Fast map performance audit\n\n## Lighthouse medians\n\n|mode|score|FCP|LCP|TBT|CLS|TTI|bytes|requests|main thread|\n|---|---:|---:|---:|---:|---:|---:|---:|---:|---:|\n';for(const[k,v]of Object.entries(lh))m+=`|${k}|${v.score?.toFixed(0)}|${v.fcp?.toFixed(0)}|${v.lcp?.toFixed(0)}|${v.tbt?.toFixed(0)}|${v.cls?.toFixed(3)}|${v.tti?.toFixed(0)}|${v.bytes?.toFixed(0)}|${v.requests}|${v.main?.toFixed(0)}|\n`;
          m+='\n## Interaction scenarios\n\n|scenario|TTFB|load|bytes|resources|heap|long tasks|long task ms|FPS|p95 frame|failed|errors|\n|---|---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|\n';for(const[k,v]of Object.entries(scenarios))m+=`|${k}|${v.ttfb?.toFixed(0)}|${v.load?.toFixed(0)}|${v.bytes?.toFixed(0)}|${v.resources}|${v.heap?.toFixed(0)}|${v.longTasks}|${v.longTaskMs?.toFixed(0)}|${v.fps?.toFixed(1)}|${v.frameP95?.toFixed(1)}|${v.failed}|${v.errors}|\n`;fs.writeFileSync('reports/summary.md',m);console.log(m);
          EOF
          node summarize.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: fast-map-performance
          path: reports
          retention-days: 5

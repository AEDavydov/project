name: SSH Target Probe

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe SSH target without credentials
        shell: bash
        run: |
          set -euo pipefail
          HOST=antiborschevik.simargl-team.ru
          sudo apt-get update >/dev/null
          sudo apt-get install -y openssh-client dnsutils netcat-openbsd >/dev/null
          echo '=== DNS ==='
          dig +short A "$HOST"
          dig +short AAAA "$HOST"
          echo '=== PORT 22 ==='
          nc -vz -w 10 "$HOST" 22
          echo '=== HOST KEYS ==='
          ssh-keyscan -T 10 -t ed25519,rsa "$HOST" 2>&1 | head -n 10
          echo '=== AUTH METHODS (NO CREDENTIALS SENT) ==='
          set +e
          ssh -vvv -o BatchMode=yes -o PreferredAuthentications=none -o PubkeyAuthentication=no \
            -o KbdInteractiveAuthentication=no -o PasswordAuthentication=no \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=10 root@"$HOST" true 2>&1 | \
            grep -E 'Authentications that can continue|Permission denied|Connection|Remote protocol version|Server host key' | tail -n 20
          exit 0

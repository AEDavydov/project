name: SSH Client Check

on:
  push:
    paths:
      - .github/workflows/ssh-client-check.yml

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install SSH and GitHub clients
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y openssh-client gh

      - name: Verify clients and outbound SSH
        shell: bash
        run: |
          set -euo pipefail
          echo "SSH_BINARY=$(command -v ssh)"
          echo "SCP_BINARY=$(command -v scp)"
          echo "GH_BINARY=$(command -v gh)"
          ssh -V 2>&1
          gh --version | head -n 2
          ssh-keyscan -T 10 github.com 2>/dev/null | head -n 3
          echo "SSH_CLIENT_READY=1"

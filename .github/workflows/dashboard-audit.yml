name: Dashboard audit

on:
  push:
    branches:
      - chatgpt-dashboard-audit
  pull_request:
    branches:
      - main

jobs:
  deep-chemistry-lab-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Install Playwright
        shell: bash
        run: |
          set -euxo pipefail
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Inspect interactive screens
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p deep-audit
          cat > inspect.mjs <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const browser = await chromium.launch({ headless: true });
          const safe = async (fn, fallback = null) => { try { return await fn(); } catch { return fallback; } };

          async function snapshot(page, key, root = page) {
            const dir = `deep-audit/${key}`;
            fs.mkdirSync(dir, { recursive: true });
            const data = {
              url: page.url(),
              title: await safe(() => page.title(), ''),
              text: await safe(() => root.locator('body').innerText(), ''),
              headings: await safe(() => root.locator('h1,h2,h3,h4').allInnerTexts(), []),
              buttons: await safe(() => root.locator('button,[role="button"],input[type="button"],input[type="submit"]').evaluateAll(nodes => nodes.map((n, index) => ({
                index,
                text: (n.innerText || n.value || n.textContent || '').trim(),
                ariaLabel: n.getAttribute('aria-label'),
                title: n.getAttribute('title'),
                className: n.className
              }))), []),
              controls: await safe(() => root.locator('input,select,textarea').evaluateAll(nodes => nodes.map((n, index) => ({
                index,
                tag: n.tagName,
                type: n.getAttribute('type'),
                name: n.getAttribute('name'),
                value: n.value,
                placeholder: n.getAttribute('placeholder'),
                ariaLabel: n.getAttribute('aria-label')
              }))), []),
              links: await safe(() => root.locator('a').evaluateAll(nodes => nodes.map(n => ({
                text: (n.innerText || n.textContent || '').trim(), href: n.href, title: n.title
              }))), []),
              html: await safe(() => root.locator('body').innerHTML(), '')
            };
            fs.writeFileSync(`${dir}/metadata.json`, JSON.stringify(data, null, 2));
            fs.writeFileSync(`${dir}/body.txt`, data.text || '');
            fs.writeFileSync(`${dir}/body.html`, data.html || '');
            await safe(() => page.screenshot({ path: `${dir}/screenshot.png`, fullPage: true }));
            console.log(`=== ${key} ===`);
            console.log(JSON.stringify({ ...data, html: undefined, text: (data.text || '').slice(0, 16000) }, null, 2));
          }

          // ChemVerse section screens.
          {
            const context = await browser.newContext({ viewport: { width: 1440, height: 1000 } });
            const page = await context.newPage();
            const sections = [
              ['chemverse-safety', /Lab Safety Training/i],
              ['chemverse-apparatus', /Apparatus Room/i],
              ['chemverse-experiments', /Experiment Labs/i],
              ['chemverse-achievements', /Achievements/i]
            ];

            for (const [key, name] of sections) {
              await page.goto('https://chemverse.vercel.app/', { waitUntil: 'networkidle', timeout: 90000 });
              await page.getByRole('button', { name }).click();
              await page.waitForTimeout(1800);
              await snapshot(page, key);

              if (key === 'chemverse-experiments') {
                const buttons = page.locator('button');
                const texts = await buttons.allInnerTexts();
                const index = texts.findIndex(t => {
                  const x = t.trim();
                  return x.length > 25 && !/back|settings|filter|level|difficulty/i.test(x);
                });
                if (index >= 0) {
                  await buttons.nth(index).click();
                  await page.waitForTimeout(1800);
                  await snapshot(page, 'chemverse-first-experiment');
                }
              }
            }
            await context.close();
          }

          // ChemCollective actual lab iframe.
          {
            const context = await browser.newContext({ viewport: { width: 1440, height: 1100 }, ignoreHTTPSErrors: true });
            const page = await context.newPage();
            await page.goto('https://chemcollective.org/activities/vlab/2', { waitUntil: 'domcontentloaded', timeout: 90000 });
            await page.waitForTimeout(7000);
            const frame = page.frame({ name: 'labframe' });
            if (!frame) throw new Error('ChemCollective labframe not found');

            await snapshot(page, 'chemcollective-before-tip-close', frame);

            for (let i = 0; i < 4; i++) {
              const close = frame.locator('.close, button:has-text("Close"), button:has-text("×"), [aria-label="Close"]');
              if (await close.count()) {
                await close.first().click({ force: true }).catch(() => {});
                await frame.waitForTimeout(300);
              }
              const next = frame.getByRole('button', { name: /Next Tip/i });
              if (await next.count()) {
                await next.first().click({ force: true }).catch(() => {});
                await frame.waitForTimeout(300);
              }
            }

            await snapshot(page, 'chemcollective-lab-open', frame);

            const menuNames = ['File', 'Edit', 'View', 'Help'];
            for (const name of menuNames) {
              const menu = frame.getByText(name, { exact: true });
              if (await menu.count()) {
                await menu.first().click({ force: true }).catch(() => {});
                await frame.waitForTimeout(300);
                await snapshot(page, `chemcollective-menu-${name.toLowerCase()}`, frame);
                await page.keyboard.press('Escape').catch(() => {});
              }
            }
            await context.close();
          }

          await browser.close();
          EOF
          node inspect.mjs

      - name: Upload deep audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chemistry-platform-deep-audit
          path: deep-audit/
          if-no-files-found: warn

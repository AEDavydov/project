name: Fetch Current Map JavaScript

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fetch:
    if: contains(github.event.pull_request.title, '[JS]')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TARGET_URL: https://antiborschevik.simargl-team.ru
    steps:
      - uses: actions/checkout@v4
      - name: Download current JavaScript
        run: |
          mkdir -p map-js
          curl -fsSL "$TARGET_URL/main.js?v=20260714-3" -o map-js/main.js
          curl -fsSL "$TARGET_URL/boot.js?v=20260714-3" -o map-js/boot.js
          curl -fsSL "$TARGET_URL/vendor/maplibre-gl/maplibre-gl.js?v=5.6.1" -o map-js/maplibre-gl.js
          wc -c map-js/* > map-js/sizes.txt
      - uses: actions/upload-artifact@v4
        with:
          name: current-map-js
          path: map-js
          retention-days: 3

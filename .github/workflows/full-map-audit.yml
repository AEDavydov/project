name: Full Map Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      TARGET_URL: https://antiborschevik.simargl-team.ru
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install audit tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl openssl
          npm install -g lighthouse@13
          npm install playwright@1.53.2
          npx playwright install --with-deps chromium
          mkdir -p reports/lighthouse reports/playwright reports/security reports/network

      - name: Network and TLS measurements
        shell: bash
        run: |
          set -u
          echo 'run,http_code,dns,tcp,tls,ttfb,total,size_download,speed_download' > reports/network/curl-timings.csv
          for run in $(seq 1 15); do
            curl -L -sS -o /dev/null --max-time 60 \
              -w "$run,%{http_code},%{time_namelookup},%{time_connect},%{time_appconnect},%{time_starttransfer},%{time_total},%{size_download},%{speed_download}\n" \
              "$TARGET_URL" >> reports/network/curl-timings.csv || true
          done
          curl -sSIL --max-time 30 "$TARGET_URL" > reports/network/headers.txt || true
          curl -sS -D reports/network/options-headers.txt -o /dev/null -X OPTIONS \
            -H 'Origin: https://security-audit.invalid' \
            -H 'Access-Control-Request-Method: GET' "$TARGET_URL" || true
          host=$(echo "$TARGET_URL" | sed -E 's#https?://([^/]+).*#\1#')
          echo | openssl s_client -connect "$host:443" -servername "$host" -showcerts \
            > reports/network/tls.txt 2>&1 || true

      - name: Lighthouse repeated runs
        shell: bash
        run: |
          set -u
          for mode in mobile desktop; do
            for run in 1 2 3 4 5; do
              args=(
                "$TARGET_URL"
                --output=json
                --output-path="reports/lighthouse/${mode}-${run}.json"
                --only-categories=performance
                --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage --enable-precise-memory-info"
                --quiet
              )
              if [ "$mode" = desktop ]; then args+=(--preset=desktop); fi
              lighthouse "${args[@]}" || true
            done
          done

      - name: Playwright interaction profiling
        shell: bash
        run: |
          cat > audit.mjs <<'EOF'
          import { chromium, devices } from 'playwright';
          import fs from 'node:fs';

          const url = process.env.TARGET_URL;
          const outDir = 'reports/playwright';
          fs.mkdirSync(outDir, { recursive: true });

          const profiles = [
            {name:'desktop-cold', viewport:{width:1440,height:900}, mobile:false, cpu:1, network:null, repeats:3},
            {name:'mobile-4g-cold', device:devices['Pixel 7'], mobile:true, cpu:4,
              network:{offline:false, latency:80, downloadThroughput:1.6*1024*1024/8, uploadThroughput:750*1024/8}, repeats:3},
            {name:'mobile-slow4g-cold', device:devices['Moto G4'], mobile:true, cpu:6,
              network:{offline:false, latency:150, downloadThroughput:750*1024/8, uploadThroughput:250*1024/8}, repeats:2},
          ];

          const layerNames = ['Участки','Спутн. 2019','GBIF','iNaturalist','ООПТ','Кадастр','OSM'];
          const results = [];

          async function installObservers(page) {
            await page.addInitScript(() => {
              window.__audit = {longTasks:[], shifts:[], events:[], errors:[], resources:[]};
              try { new PerformanceObserver(list => {
                for (const e of list.getEntries()) window.__audit.longTasks.push({start:e.startTime,duration:e.duration});
              }).observe({type:'longtask', buffered:true}); } catch {}
              try { new PerformanceObserver(list => {
                for (const e of list.getEntries()) if (!e.hadRecentInput) window.__audit.shifts.push({value:e.value,start:e.startTime});
              }).observe({type:'layout-shift', buffered:true}); } catch {}
              try { new PerformanceObserver(list => {
                for (const e of list.getEntries()) window.__audit.events.push({name:e.name,duration:e.duration,start:e.startTime});
              }).observe({type:'event', buffered:true, durationThreshold:16}); } catch {}
              window.addEventListener('error', e => window.__audit.errors.push(String(e.message || e.error || 'error')));
              window.addEventListener('unhandledrejection', e => window.__audit.errors.push(String(e.reason || 'unhandledrejection')));
            });
          }

          async function startRaf(page) {
            await page.evaluate(() => {
              window.__frames = [];
              window.__rafRunning = true;
              let prev = performance.now();
              const tick = t => {
                if (!window.__rafRunning) return;
                window.__frames.push(t-prev); prev=t; requestAnimationFrame(tick);
              };
              requestAnimationFrame(tick);
            });
          }

          async function stopRaf(page) {
            return page.evaluate(() => {
              window.__rafRunning = false;
              const x=(window.__frames||[]).slice(2).sort((a,b)=>a-b);
              const pct=p=>x.length ? x[Math.min(x.length-1,Math.floor(x.length*p))] : null;
              return {samples:x.length, avg:x.length?x.reduce((a,b)=>a+b,0)/x.length:null,
                p95:pct(.95), p99:pct(.99), over50:x.filter(v=>v>50).length,
                over100:x.filter(v=>v>100).length, fps:x.length?1000/(x.reduce((a,b)=>a+b,0)/x.length):null};
            });
          }

          async function collect(page) {
            return page.evaluate(() => {
              const nav=performance.getEntriesByType('navigation')[0];
              const resources=performance.getEntriesByType('resource').map(r=>({name:r.name, initiatorType:r.initiatorType,
                duration:r.duration, transferSize:r.transferSize, encodedBodySize:r.encodedBodySize}));
              const paint=Object.fromEntries(performance.getEntriesByType('paint').map(e=>[e.name,e.startTime]));
              const mem=performance.memory ? {usedJSHeapSize:performance.memory.usedJSHeapSize,
                totalJSHeapSize:performance.memory.totalJSHeapSize, jsHeapSizeLimit:performance.memory.jsHeapSizeLimit} : null;
              return {
                nav:nav?{dns:nav.domainLookupEnd-nav.domainLookupStart,tcp:nav.connectEnd-nav.connectStart,
                  tls:nav.secureConnectionStart?nav.connectEnd-nav.secureConnectionStart:null,
                  ttfb:nav.responseStart-nav.requestStart,domContentLoaded:nav.domContentLoadedEventEnd-nav.startTime,
                  load:nav.loadEventEnd-nav.startTime,transferSize:nav.transferSize,encodedBodySize:nav.encodedBodySize}:null,
                paint, mem, domNodes:document.getElementsByTagName('*').length,
                resourceCount:resources.length,totalTransfer:resources.reduce((s,r)=>s+(r.transferSize||0),0),
                largest:resources.sort((a,b)=>(b.transferSize||0)-(a.transferSize||0)).slice(0,20),
                slowest:[...resources].sort((a,b)=>b.duration-a.duration).slice(0,20),audit:window.__audit
              };
            });
          }

          const browser=await chromium.launch({headless:true,args:['--enable-precise-memory-info','--no-sandbox']});
          for (const profile of profiles) {
            for (let run=1; run<=profile.repeats; run++) {
              const context=await browser.newContext(profile.device ? {...profile.device} : {viewport:profile.viewport});
              const page=await context.newPage();
              const consoleMessages=[]; const failed=[]; const badResponses=[];
              page.on('console',m=>{ if(['warning','error'].includes(m.type())) consoleMessages.push({type:m.type(),text:m.text()}); });
              page.on('pageerror',e=>consoleMessages.push({type:'pageerror',text:String(e)}));
              page.on('requestfailed',r=>failed.push({url:r.url(),error:r.failure()?.errorText}));
              page.on('response',r=>{if(r.status()>=400) badResponses.push({url:r.url(),status:r.status()});});
              await installObservers(page);
              const cdp=await context.newCDPSession(page);
              if (profile.cpu>1) await cdp.send('Emulation.setCPUThrottlingRate',{rate:profile.cpu});
              if (profile.network) await cdp.send('Network.emulateNetworkConditions',profile.network);
              const started=Date.now();
              let navigationError=null;
              try { await page.goto(url,{waitUntil:'domcontentloaded',timeout:60000}); }
              catch(e){ navigationError=String(e); }
              await page.waitForTimeout(12000);
              const canvas=page.locator('.maplibregl-canvas, .mapboxgl-canvas, canvas').first();
              let interaction=null;
              if (await canvas.count()) {
                const box=await canvas.boundingBox();
                if(box){
                  await startRaf(page);
                  const t0=Date.now();
                  await page.mouse.move(box.x+box.width*.55,box.y+box.height*.55);
                  await page.mouse.down();
                  await page.mouse.move(box.x+box.width*.25,box.y+box.height*.4,{steps:18});
                  await page.mouse.up();
                  await page.mouse.wheel(0,-900);
                  await page.waitForTimeout(4000);
                  interaction={elapsed:Date.now()-t0,frames:await stopRaf(page)};
                }
              }
              const data=await collect(page);
              data.profile=profile.name; data.run=run; data.elapsed=Date.now()-started;
              data.navigationError=navigationError; data.interaction=interaction;
              data.consoleMessages=consoleMessages; data.failedRequests=failed; data.badResponses=badResponses;
              results.push(data);
              await page.screenshot({path:`${outDir}/${profile.name}-${run}.png`,fullPage:true}).catch(()=>{});
              await context.close();
            }
          }

          // Layer toggling on desktop, one fresh context per layer.
          for (const layer of layerNames) {
            const context=await browser.newContext({viewport:{width:1440,height:900}});
            const page=await context.newPage();
            const failed=[]; const consoleMessages=[];
            page.on('requestfailed',r=>failed.push({url:r.url(),error:r.failure()?.errorText}));
            page.on('console',m=>{if(['warning','error'].includes(m.type())) consoleMessages.push({type:m.type(),text:m.text()});});
            await installObservers(page);
            let clicked=false, clickError=null;
            try {
              await page.goto(url,{waitUntil:'domcontentloaded',timeout:60000});
              await page.waitForTimeout(7000);
              const before=await collect(page);
              const target=page.getByText(layer,{exact:false}).first();
              if(await target.count()){await target.click({timeout:5000});clicked=true;}
              await page.waitForTimeout(10000);
              const after=await collect(page);
              results.push({profile:'layer',layer,clicked,before,after,failedRequests:failed,consoleMessages});
            } catch(e){clickError=String(e);results.push({profile:'layer',layer,clicked,clickError,failedRequests:failed,consoleMessages});}
            await context.close();
          }
          await browser.close();
          fs.writeFileSync(`${outDir}/results.json`,JSON.stringify(results,null,2));
          EOF
          node audit.mjs

      - name: OWASP ZAP passive baseline
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD/reports/security:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t "$TARGET_URL" -m 4 -J zap.json -r zap.html -w zap.md || true

      - name: Nuclei safe external scan
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD/reports/security:/output" projectdiscovery/nuclei:latest \
            -u "$TARGET_URL" -severity low,medium,high,critical \
            -exclude-tags fuzz,dos,intrusive,bruteforce,headless \
            -rate-limit 5 -timeout 10 -retries 1 -jsonl-export /output/nuclei.jsonl || true

      - name: Build summary
        shell: bash
        run: |
          cat > summarize.mjs <<'EOF'
          import fs from 'node:fs';
          const median=x=>{x=x.filter(Number.isFinite).sort((a,b)=>a-b);if(!x.length)return null;return x[Math.floor(x.length/2)]};
          const lh=[];
          for(const mode of ['mobile','desktop']) for(let run=1;run<=5;run++){
            const p=`reports/lighthouse/${mode}-${run}.json`;if(!fs.existsSync(p))continue;
            try{const j=JSON.parse(fs.readFileSync(p));const a=j.audits||{};lh.push({mode,run,
              score:(j.categories?.performance?.score??0)*100,fcp:a['first-contentful-paint']?.numericValue,
              lcp:a['largest-contentful-paint']?.numericValue,si:a['speed-index']?.numericValue,
              tbt:a['total-blocking-time']?.numericValue,cls:a['cumulative-layout-shift']?.numericValue,
              tti:a['interactive']?.numericValue,bytes:a['total-byte-weight']?.numericValue,
              requests:a['network-requests']?.details?.items?.length,mainThread:a['mainthread-work-breakdown']?.numericValue,
              bootup:a['bootup-time']?.numericValue,server:a['server-response-time']?.numericValue});}catch{}
          }
          const keys=['score','fcp','lcp','si','tbt','cls','tti','bytes','requests','mainThread','bootup','server'];
          const lighthouse={};for(const mode of ['mobile','desktop']){const g=lh.filter(x=>x.mode===mode);lighthouse[mode]={runs:g.length};for(const k of keys)lighthouse[mode][k]=median(g.map(x=>x[k]));}
          let pw=[];try{pw=JSON.parse(fs.readFileSync('reports/playwright/results.json'));}catch{}
          const scenarios={};for(const name of [...new Set(pw.filter(x=>x.profile!=='layer').map(x=>x.profile))]){
            const g=pw.filter(x=>x.profile===name);scenarios[name]={runs:g.length,
              elapsed:median(g.map(x=>x.elapsed)),ttfb:median(g.map(x=>x.nav?.ttfb)),load:median(g.map(x=>x.nav?.load)),
              totalTransfer:median(g.map(x=>x.totalTransfer)),resources:median(g.map(x=>x.resourceCount)),
              heap:median(g.map(x=>x.mem?.usedJSHeapSize)),domNodes:median(g.map(x=>x.domNodes)),
              longTasks:median(g.map(x=>x.audit?.longTasks?.length)),longTaskMs:median(g.map(x=>(x.audit?.longTasks||[]).reduce((s,v)=>s+v.duration,0))),
              fps:median(g.map(x=>x.interaction?.frames?.fps)),frameP95:median(g.map(x=>x.interaction?.frames?.p95)),
              failedRequests:g.reduce((s,x)=>s+(x.failedRequests?.length||0),0),consoleErrors:g.reduce((s,x)=>s+(x.consoleMessages?.length||0),0)};
          }
          const layers=pw.filter(x=>x.profile==='layer').map(x=>({layer:x.layer,clicked:x.clicked,clickError:x.clickError,
            transferDelta:(x.after?.totalTransfer||0)-(x.before?.totalTransfer||0),resourceDelta:(x.after?.resourceCount||0)-(x.before?.resourceCount||0),
            heapDelta:(x.after?.mem?.usedJSHeapSize||0)-(x.before?.mem?.usedJSHeapSize||0),
            longTasks:x.after?.audit?.longTasks?.length,failedRequests:x.failedRequests?.length,consoleErrors:x.consoleMessages?.length}));
          const summary={generatedAt:new Date().toISOString(),target:process.env.TARGET_URL,lighthouse,scenarios,layers};
          fs.writeFileSync('reports/summary.json',JSON.stringify(summary,null,2));
          let md=`# Full map audit\n\nTarget: ${summary.target}\n\n## Lighthouse medians\n\n| Mode | Score | FCP ms | LCP ms | TBT ms | CLS | TTI ms | Bytes | Requests |\n|---|---:|---:|---:|---:|---:|---:|---:|---:|\n`;
          for(const [m,v] of Object.entries(lighthouse))md+=`| ${m} | ${v.score?.toFixed(0)} | ${v.fcp?.toFixed(0)} | ${v.lcp?.toFixed(0)} | ${v.tbt?.toFixed(0)} | ${v.cls?.toFixed(3)} | ${v.tti?.toFixed(0)} | ${v.bytes?.toFixed(0)} | ${v.requests} |\n`;
          md+='\n## Interaction scenarios\n\n| Scenario | TTFB ms | Load ms | Transfer bytes | Resources | Heap bytes | Long tasks | Long task ms | FPS | p95 frame ms | Failed | Console |\n|---|---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|\n';
          for(const [n,v] of Object.entries(scenarios))md+=`| ${n} | ${v.ttfb?.toFixed(0)} | ${v.load?.toFixed(0)} | ${v.totalTransfer?.toFixed(0)} | ${v.resources} | ${v.heap?.toFixed(0)} | ${v.longTasks} | ${v.longTaskMs?.toFixed(0)} | ${v.fps?.toFixed(1)} | ${v.frameP95?.toFixed(1)} | ${v.failedRequests} | ${v.consoleErrors} |\n`;
          md+='\n## Layers\n\n| Layer | Clicked | Transfer delta | Resource delta | Heap delta | Long tasks | Failed | Console |\n|---|---|---:|---:|---:|---:|---:|---:|\n';
          for(const v of layers)md+=`| ${v.layer} | ${v.clicked} | ${v.transferDelta} | ${v.resourceDelta} | ${v.heapDelta} | ${v.longTasks??''} | ${v.failedRequests??''} | ${v.consoleErrors??''} |\n`;
          fs.writeFileSync('reports/summary.md',md);
          console.log(md);
          EOF
          node summarize.mjs

      - name: Upload complete audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-map-audit
          path: reports
          retention-days: 5
